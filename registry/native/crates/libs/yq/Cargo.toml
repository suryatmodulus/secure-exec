[package]
name = "secureexec-yq"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "yq (YAML/XML/TOML/JSON processor) implementation for secure-exec standalone binaries"

[dependencies]
jaq-core = "2.2"
jaq-std = "2.1"
jaq-json = { version = "1.1", features = ["serde_json"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
quick-xml = "0.37"
