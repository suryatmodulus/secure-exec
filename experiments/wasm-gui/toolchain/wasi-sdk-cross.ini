# Meson cross file: build C projects for wasm32-wasip1 with the repo's vendored wasi-sdk.
# Used to cross-compile the X-stack (pixman, etc.) for the secure-exec wasm GUI work.
[constants]
wasi_sdk = '/home/nathan/secure-exec/registry/native/c/vendor/wasi-sdk'
# PATCHED sysroot: adds POSIX sockets (recvfrom/sendto/socket/poll/select) backed by secure-exec's
# host_net imports — required for the X stack (libxcb/libX11/xserver) to build and run in-sidecar.
sysroot = '/home/nathan/secure-exec/registry/native/c/sysroot'
vanilla_lib = wasi_sdk / 'share/wasi-sysroot/lib/wasm32-wasip1'

[binaries]
c = '/home/nathan/secure-exec/experiments/wasm-gui/toolchain/clang-wasi-wrap.sh'
cpp = '/home/nathan/secure-exec/experiments/wasm-gui/toolchain/clangxx-wasi-wrap.sh'
ar = wasi_sdk / 'bin/llvm-ar'
strip = wasi_sdk / 'bin/llvm-strip'
nm = wasi_sdk / 'bin/llvm-nm'
pkg-config = '/usr/bin/pkg-config'

[properties]
# Resolve cross dependencies only from the wasm prefix, never the host system.
pkg_config_libdir = '/home/nathan/secure-exec/experiments/wasm-gui/third_party/wasm-prefix/lib/pkgconfig:/home/nathan/secure-exec/experiments/wasm-gui/third_party/wasm-prefix/share/pkgconfig'

[host_machine]
system = 'wasi'
cpu_family = 'wasm32'
cpu = 'wasm32'
endian = 'little'

[built-in options]
default_library = 'static'
c_args = ['--target=wasm32-wasip1', '--sysroot=' + sysroot, '-D_WASI_EMULATED_MMAN', '-D_GNU_SOURCE', '-D_WASI_EMULATED_PROCESS_CLOCKS', '-DHAVE_SYS_RESOURCE_H', '-Wno-error=implicit-function-declaration', '-Wno-implicit-function-declaration', '-I/home/nathan/secure-exec/experiments/wasm-gui/toolchain/compat-include', '-include', '/home/nathan/secure-exec/experiments/wasm-gui/toolchain/wasi-compat.h']
c_link_args = ['--target=wasm32-wasip1', '--sysroot=' + sysroot, '-L' + vanilla_lib, '-lwasi-emulated-mman', '-lwasi-emulated-process-clocks', '/home/nathan/secure-exec/experiments/wasm-gui/toolchain/wasi-compat.o']
cpp_args = ['--target=wasm32-wasip1', '--sysroot=' + sysroot, '-D_WASI_EMULATED_MMAN', '-D_GNU_SOURCE', '-fno-exceptions']
cpp_link_args = ['--target=wasm32-wasip1', '--sysroot=' + sysroot, '-L' + vanilla_lib, '-lwasi-emulated-mman']
