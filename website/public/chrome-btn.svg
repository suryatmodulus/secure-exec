<svg xmlns="http://www.w3.org/2000/svg" width="120" height="60" viewBox="0 0 120 60">
  <defs>
    <!-- Outer chrome bezel gradient -->
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="12%" stop-color="#f0f0f0"/>
      <stop offset="25%" stop-color="#b8b8b8"/>
      <stop offset="38%" stop-color="#8a8a90"/>
      <stop offset="48%" stop-color="#4a4a55"/>
      <stop offset="55%" stop-color="#2a2a35"/>
      <stop offset="65%" stop-color="#505058"/>
      <stop offset="78%" stop-color="#909098"/>
      <stop offset="88%" stop-color="#a8a8b0"/>
      <stop offset="100%" stop-color="#787880"/>
    </linearGradient>

    <!-- Inner face gradient -->
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b0b5"/>
      <stop offset="15%" stop-color="#c4c4c8"/>
      <stop offset="30%" stop-color="#a8aab0"/>
      <stop offset="48%" stop-color="#606870"/>
      <stop offset="56%" stop-color="#484e58"/>
      <stop offset="64%" stop-color="#606870"/>
      <stop offset="78%" stop-color="#8a8a90"/>
      <stop offset="90%" stop-color="#909098"/>
      <stop offset="100%" stop-color="#808088"/>
    </linearGradient>

    <!-- Warm/cool tint overlay for bezel edges -->
    <linearGradient id="tint-lr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a7a60" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#8a7a60" stop-opacity="0"/>
      <stop offset="60%" stop-color="#4a5a70" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4a5a70" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Specular highlight on bezel top -->
    <linearGradient id="spec-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>

    <!-- Dark inner edge -->
    <linearGradient id="inner-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.05"/>
      <stop offset="15%" stop-color="#000" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#000" stop-opacity="0.15"/>
      <stop offset="85%" stop-color="#000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Bottom-right shadow radial -->
    <radialGradient id="br-shadow" cx="0.8" cy="0.8" r="0.5">
      <stop offset="0%" stop-color="#000" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer bezel shape -->
  <rect x="0" y="0" width="120" height="60" rx="30" ry="30" fill="url(#bezel)"/>

  <!-- Warm/cool tint on bezel -->
  <rect x="0" y="0" width="120" height="60" rx="30" ry="30" fill="url(#tint-lr)"/>

  <!-- Specular top highlight on bezel -->
  <rect x="0" y="0" width="120" height="60" rx="30" ry="30" fill="url(#spec-top)"/>

  <!-- Dark gap ring (between bezel and face) -->
  <rect x="4" y="4" width="112" height="52" rx="26" ry="26" fill="#303038"/>

  <!-- Bright inner rim -->
  <rect x="5" y="4.5" width="110" height="51" rx="25.5" ry="25.5" fill="none" stroke="#fff" stroke-opacity="0.5" stroke-width="0.8"/>

  <!-- Face fill -->
  <rect x="6" y="6" width="108" height="48" rx="24" ry="24" fill="url(#face)"/>

  <!-- Dark inner edge overlay on face -->
  <rect x="6" y="6" width="108" height="48" rx="24" ry="24" fill="url(#inner-edge)" opacity="0.15"/>

  <!-- Bottom-right shadow on face -->
  <rect x="6" y="6" width="108" height="48" rx="24" ry="24" fill="url(#br-shadow)"/>
</svg>
